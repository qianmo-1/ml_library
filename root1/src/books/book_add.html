{% extends "base.html" %}
{% load static %}

{% block title %}新增图书{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'book_manage' %}">图书管理</a></li>
        <li class="breadcrumb-item active" aria-current="page">新增图书</li>
    </ol>
</nav>

<div class="page-header">
    <h4 class="page-title">新增图书</h4>
</div>

<div class="glass-card p-4">
    <form id="bookForm" enctype="multipart/form-data" novalidate>
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6">
                <label for="title" class="form-label">书名 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="title" name="title" placeholder="请输入书名" required>
            </div>
            <div class="col-md-6">
                <label for="author" class="form-label">作者 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="author" name="author" placeholder="请输入作者" required>
            </div>
            <div class="col-md-6">
                <label for="isbn" class="form-label">ISBN <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="isbn" name="isbn" placeholder="请输入ISBN" required>
            </div>
            <div class="col-md-6">
                <label for="publisher" class="form-label">出版社</label>
                <input type="text" class="form-control" id="publisher" name="publisher" placeholder="请输入出版社">
            </div>
            <div class="col-md-6">
                <label for="publish_date" class="form-label">出版日期</label>
                <input type="date" class="form-control" id="publish_date" name="publish_date">
            </div>
            <div class="col-md-6">
                <label for="category_id" class="form-label">分类</label>
                <select class="form-select" id="category_id" name="category_id">
                    <option value="">请选择分类</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-12">
                <label for="description" class="form-label">简介</label>
                <textarea class="form-control" id="description" name="description" rows="4" placeholder="请输入图书简介"></textarea>
            </div>
            <div class="col-md-6">
                <label for="total_stock" class="form-label">总库存 <span class="text-danger">*</span></label>
                <input type="number" class="form-control" id="total_stock" name="total_stock" placeholder="请输入总库存数量" min="0" value="1" required>
            </div>
            <div class="col-md-6">
                <label for="cover" class="form-label">封面图片</label>
                <input type="file" class="form-control" id="cover" name="cover" accept="image/*">
                <div id="coverPreview" class="mt-3" style="display: none;">
                    <img id="coverPreviewImg" src="#" alt="封面预览" style="max-width: 200px; max-height: 280px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1);">
                </div>
            </div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary" id="submitBtn">
                <i class="bi bi-check-lg me-1"></i>保存
            </button>
            <a href="{% url 'book_manage' %}" class="btn btn-outline-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function() {
    $('#cover').on('change', function() {
        var file = this.files[0];
        if (file) {
            var reader = new FileReader();
            reader.onload = function(e) {
                $('#coverPreviewImg').attr('src', e.target.result);
                $('#coverPreview').show();
            };
            reader.readAsDataURL(file);
        } else {
            $('#coverPreview').hide();
        }
    });

    $('#bookForm').on('submit', function(e) {
        e.preventDefault();

        var title = $('#title').val().trim();
        var author = $('#author').val().trim();
        var isbn = $('#isbn').val().trim();
        var totalStock = $('#total_stock').val().trim();

        if (!title) {
            showToast('请输入书名', 'warning');
            $('#title').focus();
            return;
        }
        if (!author) {
            showToast('请输入作者', 'warning');
            $('#author').focus();
            return;
        }
        if (!isbn) {
            showToast('请输入ISBN', 'warning');
            $('#isbn').focus();
            return;
        }
        if (!totalStock || parseInt(totalStock) < 0) {
            showToast('请输入有效的总库存数量', 'warning');
            $('#total_stock').focus();
            return;
        }

        var btn = $('#submitBtn');
        btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span>保存中...');

        var formData = new FormData(this);

        $.ajax({
            url: '{% url "book_add" %}',
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false,
            success: function(response) {
                if (response.code === 200) {
                    showToast('图书添加成功', 'success');
                    setTimeout(function() {
                        window.location.href = '{% url "book_manage" %}';
                    }, 1000);
                } else {
                    showToast(response.msg || '添加失败', 'error');
                    btn.prop('disabled', false).html('<i class="bi bi-check-lg me-1"></i>保存');
                }
            },
            error: function(xhr) {
                var message = '服务器错误，请稍后重试';
                try {
                    var res = JSON.parse(xhr.responseText);
                    message = res.msg || message;
                } catch(e) {}
                showToast(message, 'error');
                btn.prop('disabled', false).html('<i class="bi bi-check-lg me-1"></i>保存');
            }
        });
    });
});
</script>
{% endblock %}
