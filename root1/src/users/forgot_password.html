{% extends "base.html" %}
{% load static %}

{% block title %}找回密码 - NOVA·图书馆{% endblock %}

{% block body_content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-brand-sci">◈</span>
    </div>
    <div class="steps">
      <div class="step active">
        <span class="step-number">1</span>验证身份
      </div>
      <div class="step">
        <span class="step-number">2</span>重置密码
      </div>
    </div>
    <h2>找回密码</h2>
    <p class="auth-subtitle">请验证您的身份信息</p>
    <form id="forgotPasswordForm" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required>
        </div>
      </div>
      <div class="mb-3">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-phone"></i></span>
          <input type="text" class="form-control" id="phone" name="phone" placeholder="请输入注册时填写的手机号" maxlength="11">
        </div>
      </div>
      <div class="mb-3">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
          <input type="text" class="form-control" id="studentId" name="student_id" placeholder="请输入学号或工号">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100" id="verifyBtn">验 证</button>
    </form>
    <div class="text-center mt-3 auth-switch-text">
      <a href="{% url 'login' %}"><i class="bi bi-arrow-left me-1"></i>返回登录</a>
    </div>
  </div>
</div>
{% endblock body_content %}

{% block extra_js %}
<script>
$(function() {
  $('#forgotPasswordForm').on('submit', function(e) {
    e.preventDefault();
    var $btn = $('#verifyBtn');
    $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span>验证中...');
    $.ajax({
      url: "{% url 'forgot_password' %}",
      type: "POST",
      data: {
        username: $('#username').val(),
        phone: $('#phone').val(),
        student_id: $('#studentId').val()
      },
      success: function(res) {
        if (res.code === 200) {
          showToast(res.msg || '验证成功', 'success');
          var nextUrl = (res.data && res.data.next) || "{% url 'reset_password' %}";
          setTimeout(function() { window.location.href = nextUrl; }, 800);
        } else {
          showToast(res.msg || '验证失败', 'error');
          $btn.prop('disabled', false).html('验 证');
        }
      },
      error: function(xhr) {
        var msg = '验证失败';
        try { msg = JSON.parse(xhr.responseText).msg || msg; } catch(e) {}
        showToast(msg, 'error');
        $btn.prop('disabled', false).html('验 证');
      }
    });
  });
});
</script>
{% endblock %}
