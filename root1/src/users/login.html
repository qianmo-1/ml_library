{% extends "base.html" %}
{% load static %}

{% block title %}用户登录 - NOVA·图书馆{% endblock %}

{% block body_content %}
<div class="auth-wrapper">
  <div class="auth-particles" id="authParticles"></div>
  <div class="auth-glow-ring"></div>
  <div class="auth-glow-ring auth-glow-ring-secondary"></div>
  <div class="auth-card">
    <div class="auth-card-inner">
      <div class="auth-logo">
        <span class="auth-brand-sci">◈</span>
      </div>
      <h2>欢迎回来</h2>
      <p class="auth-subtitle">登录您的NOVA·图书馆账户</p>
      <form id="loginForm" novalidate>
        {% csrf_token %}
        <div class="mb-3 auth-field-group">
          <div class="input-group auth-input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <div class="auth-input-divider"></div>
            <input type="text" class="form-control auth-form-control" id="username" name="username" placeholder="请输入用户名" required autocomplete="username">
          </div>
        </div>
        <div class="auth-field-separator">
          <span class="auth-sep-line"></span>
          <span class="auth-sep-dot">◆</span>
          <span class="auth-sep-line"></span>
        </div>
        <div class="mb-3 auth-field-group">
          <div class="input-group auth-input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <div class="auth-input-divider"></div>
            <input type="password" class="form-control auth-form-control" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
          </div>
        </div>
        <div class="mb-3 text-end">
          <a href="{% url 'forgot_password' %}" class="auth-link auth-link-glow">忘记密码?</a>
        </div>
        <button type="submit" class="btn-auth-submit btn-lg w-100" id="loginBtn">登 录</button>
      </form>
      <div class="text-center mt-3 auth-switch-text">
        还没有账号? <a href="{% url 'register' %}" class="auth-link-glow">立即注册</a>
      </div>
    </div>
  </div>
</div>
{% endblock body_content %}

{% block extra_css %}
<style>
.auth-wrapper {
  overflow: hidden;
}

/* ============ Floating Particles ============ */
.auth-particles {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.auth-particle {
  position: absolute;
  border-radius: 50%;
  background: var(--cyan);
  pointer-events: none;
  opacity: 0;
  animation: authParticleFloat linear infinite;
}

@keyframes authParticleFloat {
  0% {
    opacity: 0;
    transform: translateY(0) translateX(0) scale(0);
  }
  5% {
    opacity: 1;
  }
  85% {
    opacity: 0.6;
  }
  100% {
    opacity: 0;
    transform: translateY(-100vh) translateX(var(--drift)) scale(1.2);
  }
}

/* ============ Decorative Glow Rings ============ */
.auth-glow-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 520px;
  height: 520px;
  border-radius: 50%;
  border: 1.5px solid rgba(0, 240, 255, 0.12);
  transform: translate(-50%, -50%);
  z-index: 0;
  pointer-events: none;
  animation: authRingPulse 4s ease-in-out infinite;
  box-shadow:
    0 0 60px rgba(0, 240, 255, 0.06),
    inset 0 0 60px rgba(0, 240, 255, 0.03);
}

.auth-glow-ring-secondary {
  width: 620px;
  height: 620px;
  border-color: rgba(255, 0, 255, 0.08);
  animation: authRingPulse 5s ease-in-out infinite reverse;
  box-shadow:
    0 0 80px rgba(255, 0, 255, 0.04),
    inset 0 0 80px rgba(255, 0, 255, 0.02);
}

@keyframes authRingPulse {
  0%, 100% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.6;
  }
  50% {
    transform: translate(-50%, -50%) scale(1.08);
    opacity: 1;
  }
}

/* ============ Auth Card Enhanced Glassmorphism ============ */
.auth-card {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 440px;
  background: rgba(8, 8, 30, 0.75);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid rgba(0, 240, 255, 0.18);
  border-radius: var(--radius-xl);
  padding: 2.5rem;
  box-shadow:
    0 0 60px rgba(0, 240, 255, 0.1),
    0 0 120px rgba(255, 0, 255, 0.06),
    0 30px 80px rgba(0, 0, 0, 0.5),
    inset 0 1px 0 rgba(255, 255, 255, 0.04);
  animation: authCardEntrance 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
  overflow: visible;
}

.auth-card::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: calc(var(--radius-xl) + 2px);
  background: linear-gradient(135deg,
    rgba(0, 240, 255, 0.35),
    rgba(255, 0, 255, 0.2),
    rgba(0, 240, 255, 0.35),
    rgba(255, 0, 255, 0.2)
  );
  background-size: 300% 300%;
  z-index: -1;
  opacity: 0.5;
  animation: authBorderGlow 6s linear infinite;
}

.auth-card::after {
  content: '';
  position: absolute;
  inset: 1px;
  border-radius: calc(var(--radius-xl) - 2px);
  background: rgba(8, 8, 30, 0.85);
  z-index: -1;
}

@keyframes authCardEntrance {
  0% {
    opacity: 0;
    transform: translateY(40px) scale(0.92);
    filter: blur(8px);
  }
  60% {
    opacity: 1;
    transform: translateY(-4px) scale(1.01);
    filter: blur(0);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

@keyframes authBorderGlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.auth-card-inner {
  position: relative;
  z-index: 1;
}

/* ============ Auth Logo ============ */
.auth-card .auth-logo {
  text-align: center;
  margin-bottom: 1.5rem;
  animation: authLogoFade 1s 0.2s both;
}

@keyframes authLogoFade {
  from { opacity: 0; transform: translateY(-10px) scale(0.8); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.auth-brand-sci {
  font-size: 3rem;
  color: var(--cyan);
  text-shadow: 0 0 20px var(--cyan-glow), 0 0 40px rgba(0, 240, 255, 0.4), 0 0 80px rgba(0, 240, 255, 0.2);
  animation: authIconPulse 3s ease-in-out infinite;
}

@keyframes authIconPulse {
  0%, 100% { text-shadow: 0 0 20px var(--cyan-glow), 0 0 40px rgba(0, 240, 255, 0.4); }
  50% { text-shadow: 0 0 30px var(--cyan-glow), 0 0 60px rgba(0, 240, 255, 0.6), 0 0 100px rgba(0, 240, 255, 0.3); }
}

.auth-card h2 {
  font-family: var(--font);
  font-weight: 800;
  font-size: 1.5rem;
  letter-spacing: 0.06em;
  margin-bottom: 0.25rem;
  text-align: center;
  color: var(--text-primary);
  text-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
  animation: authTextFade 1s 0.3s both;
}

.auth-card .auth-subtitle {
  color: var(--text-muted);
  font-size: 0.85rem;
  text-align: center;
  margin-bottom: 1.75rem;
  animation: authTextFade 1s 0.35s both;
}

@keyframes authTextFade {
  from { opacity: 0; transform: translateY(-5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============ Cyberpunk / Sci-Fi Inputs ============ */
.auth-field-group {
  animation: authTextFade 1s 0.4s both;
}

.auth-field-group:nth-of-type(2) {
  animation-delay: 0.5s;
}

.auth-input-group {
  background: rgba(0, 0, 0, 0.3);
  border-radius: var(--radius);
  box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.4);
  transition: all var(--transition);
}

.auth-input-group:focus-within {
  box-shadow:
    inset 0 1px 3px rgba(0, 0, 0, 0.4),
    0 0 0 2px rgba(0, 240, 255, 0.2),
    0 0 20px rgba(0, 240, 255, 0.1);
}

.auth-input-group .input-group-text {
  background: rgba(0, 240, 255, 0.05);
  border: 1px solid rgba(0, 240, 255, 0.2);
  border-right: none;
  color: var(--cyan);
  border-radius: var(--radius) 0 0 var(--radius);
  transition: all var(--transition);
  min-width: 44px;
  justify-content: center;
}

.auth-input-group:focus-within .input-group-text {
  background: rgba(0, 240, 255, 0.1);
  border-color: rgba(0, 240, 255, 0.4);
  text-shadow: 0 0 8px var(--cyan-glow);
  box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.05);
}

.auth-input-divider {
  width: 1px;
  background: linear-gradient(180deg,
    transparent,
    rgba(0, 240, 255, 0.3),
    rgba(0, 240, 255, 0.3),
    transparent
  );
  transition: all var(--transition);
}

.auth-input-group:focus-within .auth-input-divider {
  background: linear-gradient(180deg,
    transparent,
    rgba(0, 240, 255, 0.6),
    rgba(0, 240, 255, 0.6),
    transparent
  );
}

.auth-form-control {
  background: rgba(10, 10, 30, 0.5) !important;
  border: 1px solid rgba(0, 240, 255, 0.2) !important;
  border-left: none !important;
  border-radius: 0 var(--radius) var(--radius) 0 !important;
  color: var(--text-primary) !important;
  padding: 0.7rem 1rem;
  font-size: 0.95rem;
  transition: all var(--transition);
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
}

.auth-form-control::placeholder {
  color: rgba(119, 136, 170, 0.5);
}

.auth-form-control:focus {
  background: rgba(12, 12, 40, 0.6) !important;
  border-color: rgba(0, 240, 255, 0.5) !important;
  box-shadow:
    inset 0 2px 4px rgba(0, 0, 0, 0.3),
    0 0 15px rgba(0, 240, 255, 0.15),
    0 0 30px rgba(0, 240, 255, 0.05) !important;
  color: #fff !important;
}

.auth-form-control:focus::placeholder {
  color: rgba(0, 240, 255, 0.3);
}

/* ============ Decorative Field Separator ============ */
.auth-field-separator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 0.3rem 0 1rem 0;
  animation: authTextFade 1s 0.45s both;
}

.auth-sep-line {
  flex: 1;
  height: 1px;
  max-width: 80px;
  background: linear-gradient(90deg,
    transparent,
    rgba(0, 240, 255, 0.25),
    transparent
  );
}

.auth-sep-dot {
  color: rgba(0, 240, 255, 0.4);
  font-size: 0.5rem;
  text-shadow: 0 0 6px rgba(0, 240, 255, 0.4);
}

/* ============ Submit Button - Dramatic ============ */
.btn-auth-submit {
  display: block;
  width: 100%;
  padding: 0.85rem 1.5rem;
  font-family: var(--font);
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: #060610;
  background: linear-gradient(135deg, #00e0ff 0%, #00b8d4 25%, #00f0ff 50%, #0091ea 100%);
  background-size: 200% 200%;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all var(--transition);
  box-shadow:
    0 0 20px rgba(0, 240, 255, 0.35),
    0 0 40px rgba(255, 0, 255, 0.12),
    0 4px 15px rgba(0, 0, 0, 0.4);
  animation: authTextFade 1s 0.55s both;
}

.btn-auth-submit::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg,
    transparent,
    rgba(255, 255, 255, 0.25),
    transparent
  );
  transition: left 0.5s;
}

.btn-auth-submit:hover {
  background-position: 100% 50%;
  transform: translateY(-2px);
  box-shadow:
    0 0 30px rgba(0, 240, 255, 0.5),
    0 0 60px rgba(255, 0, 255, 0.2),
    0 8px 25px rgba(0, 0, 0, 0.5);
  color: #020210;
}

.btn-auth-submit:hover::before {
  left: 100%;
}

.btn-auth-submit:active {
  transform: translateY(0) scale(0.97);
  box-shadow:
    0 0 40px rgba(0, 240, 255, 0.6),
    0 0 80px rgba(255, 0, 255, 0.3),
    0 2px 8px rgba(0, 0, 0, 0.4);
  transition: all 0.1s;
}

.btn-auth-submit:disabled {
  background: linear-gradient(135deg, #2a3a50 0%, #1a2a40 100%);
  color: rgba(255, 255, 255, 0.4);
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
  cursor: not-allowed;
  transform: none;
}

/* ============ Glowing Links ============ */
.auth-link-glow {
  color: var(--cyan);
  text-decoration: none;
  font-weight: 500;
  font-size: 0.85rem;
  position: relative;
  transition: all var(--transition);
}

.auth-link-glow::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(0, 240, 255, 0.5),
    transparent
  );
  transform: scaleX(0);
  transition: transform var(--transition);
}

.auth-link-glow:hover {
  color: #fff !important;
  text-shadow:
    0 0 10px var(--cyan-glow),
    0 0 20px rgba(0, 240, 255, 0.5),
    0 0 40px rgba(0, 240, 255, 0.3);
}

.auth-link-glow:hover::after {
  transform: scaleX(1);
}

/* ============ Auth Switch (Register Link) ============ */
.auth-switch-text a.auth-link-glow {
  font-weight: 600;
  font-size: 0.9rem;
}

.auth-switch-text {
  animation: authTextFade 1s 0.6s both;
}

/* ============ Responsive ============ */
@media (max-width: 767.98px) {
  .auth-card {
    padding: 1.5rem;
    margin: 1rem;
    border-radius: var(--radius-lg);
  }
  .auth-card::before {
    border-radius: calc(var(--radius-lg) + 2px);
  }
  .auth-card::after {
    border-radius: calc(var(--radius-lg) - 2px);
  }
  .auth-glow-ring {
    width: 340px;
    height: 340px;
  }
  .auth-glow-ring-secondary {
    width: 400px;
    height: 400px;
  }
}
</style>
{% endblock extra_css %}

{% block extra_js %}
<script>
(function() {
  var container = document.getElementById('authParticles');
  if (!container) return;
  var count = 35;
  var colors = ['rgba(0,240,255,0.5)', 'rgba(0,240,255,0.3)', 'rgba(255,0,255,0.25)', 'rgba(0,240,255,0.15)'];
  for (var i = 0; i < count; i++) {
    var p = document.createElement('div');
    p.className = 'auth-particle';
    var size = Math.random() * 3 + 1.5;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = (Math.random() * 60 + 40) + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
    p.style.animationDuration = (Math.random() * 8 + 6) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.boxShadow = '0 0 ' + (size * 2) + 'px ' + p.style.background;
    container.appendChild(p);
  }
})();
</script>
<script>
$(function() {
  $('#loginForm').on('submit', function(e) {
    e.preventDefault();
    var $btn = $('#loginBtn');
    $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span>登录中...');
    $.ajax({
      url: "{% url 'login' %}",
      type: "POST",
      timeout: 15000,
      data: {
        username: $('#username').val(),
        password: $('#password').val(),
        csrfmiddlewaretoken: $('input[name="csrfmiddlewaretoken"]').val()
      },
      success: function(res) {
        try {
          if (res.code === 200) {
            showToast(res.msg || '登录成功', 'success');
            setTimeout(function() { window.location.href = (res.data && res.data.next) || "{% url 'index' %}"; }, 500);
          } else {
            showToast(res.msg || '登录失败', 'error');
            $btn.prop('disabled', false).html('登 录');
          }
        } catch(e) {
          console.error(e);
          $btn.prop('disabled', false).html('登 录');
        }
      },
      error: function(xhr) {
        var msg = '登录失败';
        try { var r = JSON.parse(xhr.responseText); msg = r.msg || r.message || msg; } catch(e) {}
        try {
          showToast(msg, 'error');
        } catch(e) {
          console.error(e);
        }
        $btn.prop('disabled', false).html('登 录');
      }
    });
  });
});
</script>
{% endblock %}
