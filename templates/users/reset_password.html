{% extends "base.html" %}
{% load static %}

{% block title %}重置密码 - NOVA·图书馆{% endblock %}

{% block body_content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-brand-sci">◈</span>
    </div>
    <div class="steps">
      <div class="step done">
        <span class="step-number">1</span>验证身份
      </div>
      <div class="step active">
        <span class="step-number">2</span>重置密码
      </div>
    </div>
    <h2>设置新密码</h2>
    <p class="auth-subtitle">请输入您的新密码</p>
    <form id="resetPasswordForm" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" id="newPassword" name="new_password" placeholder="请输入新密码" required minlength="6">
        </div>
      </div>
      <div class="mb-3">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
          <input type="password" class="form-control" id="confirmPassword" name="confirm_password" placeholder="请再次输入新密码" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100" id="submitBtn">重置密码</button>
    </form>
    <div class="text-center mt-3 auth-switch-text">
      <a href="{% url 'login' %}"><i class="bi bi-arrow-left me-1"></i>返回登录</a>
    </div>
  </div>
</div>
{% endblock body_content %}

{% block extra_js %}
<script>
$(function() {
  $('#resetPasswordForm').on('submit', function(e) {
    e.preventDefault();
    var pwd = $('#newPassword').val();
    var confirmPwd = $('#confirmPassword').val();
    if (pwd !== confirmPwd) {
      showToast('两次输入的密码不一致', 'error');
      return;
    }
    var $btn = $('#submitBtn');
    $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span>提交中...');
    $.ajax({
      url: "{% url 'reset_password' %}",
      type: "POST",
      data: {
        new_password: pwd,
        confirm_password: confirmPwd
      },
      success: function(res) {
        if (res.code === 200) {
          showToast(res.msg || '密码重置成功', 'success');
          setTimeout(function() { window.location.href = "{% url 'login' %}"; }, 800);
        } else {
          showToast(res.msg || '重置失败', 'error');
          $btn.prop('disabled', false).html('重置密码');
        }
      },
      error: function(xhr) {
        var msg = '重置失败';
        try { msg = JSON.parse(xhr.responseText).msg || msg; } catch(e) {}
        showToast(msg, 'error');
        $btn.prop('disabled', false).html('重置密码');
      }
    });
  });
});
</script>
{% endblock %}
